<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard - YANSTREAM</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#111827;
    color:#fff;
    margin:20px;
}
.card{
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    font-size:16px;
}
input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:none;
    box-sizing:border-box;
}
</style>
</head>
<body>

<h2>YANSTREAM Dashboard</h2>
<hr>

<h3>Menu</h3>

<button onclick="location.href='upload.html'">📤 Upload Video</button>

<button onclick="location.href='library.html'">🎥 Video Library</button>

<button onclick="location.href='schedule.html'">📅 Jadwal Live</button>
<button onclick="location.href='settings.html'">⚙️ Pengaturan</button>

<hr> 


<div class="card">
  <h3>🎥 Video Dipilih</h3>

<p id="selectedVideo">
Belum ada video dipilih
</p>  
<h3>RTMP URL</h3>
<input type="text" id="rtmp" placeholder="Masukkan RTMP URL">

<h3>Stream Key</h3>
<input type="text" id="streamkey" placeholder="Masukkan Stream Key">

<button onclick="simpan()">💾 Simpan</button>
</div>

<p><b>Status Live:</b> <span id="status">🔴 Offline</span></p>

<button onclick="startLive()">▶ Start Live</button>

<button onclick="stopLive()">■ Stop Live</button>

 <script>
document.getElementById("rtmp").value =
localStorage.getItem("rtmp") || "";

document.getElementById("streamkey").value =
localStorage.getItem("streamkey") || "";

function simpan() {
    localStorage.setItem(
        "rtmp",
        document.getElementById("rtmp").value
    );

    localStorage.setItem(
        "streamkey",
        document.getElementById("streamkey").value
    );

    alert("Data berhasil disimpan");
}

     function startLive() {
    document.getElementById("status").innerHTML = "🟢 Online";
    localStorage.setItem("status", "🟢 Online");
}

function stopLive() {
    document.getElementById("status").innerHTML = "🔴 Offline";
    localStorage.setItem("status", "🔴 Offline");
}

document.getElementById("status").innerHTML =
    localStorage.getItem("status") || "🔴 Offline";
     const selectedVideo = localStorage.getItem("selectedVideo");

if (selectedVideo) {
    document.getElementById("selectedVideo").innerHTML = selectedVideo;
}
</script>   
</body>
</html>
