<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library - YANSTREAM</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    margin:20px;
}

.box{
    background:#1f2937;
    padding:20px;
    border-radius:10px;
}

.video{
    padding:10px;
    border-bottom:1px solid #374151;
}

a{
    color:#60a5fa;
    text-decoration:none;
}
</style>

</head>
<body>

<h2>🎬 Video Library</h2>

<div class="box" id="videoList">
Memuat daftar video...
</div>

<br>

<a href="dashboard.html">⬅ Kembali ke Dashboard</a>

<script>

async function loadVideos(){

    try{

        const response = await fetch("https://yanstream-production.up.railway.app/videos");

        const data = await response.json();

        if(data.success){

            let html="";

            data.videos.forEach(video=>{
                html += `<div class="video">📹 ${video}</div>`;
            });

            document.getElementById("videoList").innerHTML = html || "Belum ada video.";

        }else{

            document.getElementById("videoList").innerHTML = data.message;

        }

    }catch(err){

        document.getElementById("videoList").innerHTML = err.message;

    }

}

loadVideos();

</script>

</body>
</html>
