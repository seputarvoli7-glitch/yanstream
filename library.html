<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library - YANSTREAM</title>
<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
margin:20px;
}
.card{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}
a{
color:#60a5fa;
text-decoration:none;
}
</style>
</head>
<body>

<h2>🎥 Video Library</h2>

<div class="card" id="videoList">
Belum ada video.
</div>

<p><a href="dashboard.html">⬅ Kembali ke Dashboard</a></p>

  <script>
let videos = JSON.parse(localStorage.getItem("videos")) || [];

const videoList = document.getElementById("videoList");

if (videos.length > 0) {
    videoList.innerHTML = "";

    videos.forEach(function(video, index) {
        videoList.innerHTML +=
        "<p>" + (index + 1) + ". " + video + "</p>";
    });
}
</script>
</body>
</html>
