<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library - YANSTREAM</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    margin:20px;
}

.box{
    background:#1f2937;
    padding:20px;
    border-radius:10px;
}

.video{
    padding:10px;
    border-bottom:1px solid #374151;
}

a{
    color:#60a5fa;
    text-decoration:none;
}
</style>

</head>
<body>

<h2>🎬 Video Library</h2>

<div class="box" id="videoList">
Memuat daftar video...
</div>

<br>

<a href="dashboard.html">⬅ Kembali ke Dashboard</a>

<script>

async function loadVideos(){

    try{

        const response = await fetch("https://yanstream-production.up.railway.app/videos");

        const data = await response.json();

        if(data.success){

            let html="";

            data.videos.forEach(video => {

    html += `
        <div class="video">
            📹 ${video}
            <br><br>
            <button onclick="previewVideo('${video}')">▶️ Preview</button>

<button onclick="startLive('${video}')">🔴 Start Live</button>

<button onclick="deleteVideo('${video}')">🗑 Hapus</button>
        </div>
    `;

});

            document.getElementById("videoList").innerHTML = html || "Belum ada video.";

        }else{

            document.getElementById("videoList").innerHTML = data.message;

        }

    }catch(err){

        document.getElementById("videoList").innerHTML = err.message;

    }

}

loadVideos();

   async function deleteVideo(filename) {

    if (!confirm("Hapus video ini?")) {
        return;
    }

    try {

        const response = await fetch(
            "https://yanstream-production.up.railway.app/delete/" + encodeURIComponent(filename),
            {
                method: "DELETE"
            }
        );

        const data = await response.json();

        alert(data.message);

        loadVideos();

    } catch (err) {

        alert("Gagal menghapus: " + err.message);

    }

} 

    function previewVideo(filename){

    const video =
        document.getElementById("previewPlayer");

    video.src =
        "https://yanstream-production.up.railway.app/uploads/" +
        encodeURIComponent(filename);

    document.getElementById("previewBox").style.display =
        "block";

}

function closePreview(){

    const video =
        document.getElementById("previewPlayer");

    video.pause();

    video.src = "";

    document.getElementById("previewBox").style.display =
        "none";

}

   async function startLive(filename){

    const rtmp = localStorage.getItem("rtmp");
    const streamKey = localStorage.getItem("streamKey");
    const resolution = localStorage.getItem("resolution");
    const bitrate = localStorage.getItem("bitrate");

    if(!rtmp || !streamKey){
        alert("Silakan isi RTMP URL dan Stream Key di Settings.");
        return;
    }

    alert(
        "Video: " + filename +
        "\nRTMP: " + rtmp +
        "\nResolusi: " + resolution +
        "\nBitrate: " + bitrate + " kbps"
    );

} 
</script>

<div id="previewBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);">

<div style="max-width:800px;margin:40px auto;background:#1f2937;padding:20px;border-radius:10px;">

<video id="previewPlayer" controls width="100%"></video>

<br><br>

<button onclick="closePreview()">Tutup</button>

</div>

</div>
    
</body>
</html>
