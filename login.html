<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - YANSTREAM</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:320px;
    background:#1f2937;
    padding:25px;
    border-radius:10px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

a{
    color:#60a5fa;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="box">

<h2>YANSTREAM</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">
<button onclick="login()">Masuk</button>
<p style="text-align:center">
Belum punya akun?<br>
<a href="#">Daftar</a>
</p>

</div>

   <script>
function login() {
    alert("Berhasil");
}
</script>
</body>
</html>
