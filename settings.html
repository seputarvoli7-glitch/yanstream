<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengaturan - YANSTREAM</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
margin:20px;
}
.card{
background:#1f2937;
padding:20px;
border-radius:10px;
}
label{
display:block;
margin-top:10px;
}
input{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
box-sizing:border-box;
}
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-size:16px;
}
a{
color:#60a5fa;
text-decoration:none;
}
</style>

</head>
<body>

<h2>⚙️ Pengaturan</h2>

<div class="card">

<label>Nama Pengguna</label>
<input type="text" placeholder="Masukkan nama">

<label>Email</label>
<input type="email" placeholder="Masukkan email">

<button>Simpan</button>

</div>

<p><a href="dashboard.html">⬅ Kembali ke Dashboard</a></p>

</body>
</html>
