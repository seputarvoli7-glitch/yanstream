<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengaturan - YANSTREAM</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
margin:20px;
}
.card{
background:#1f2937;
padding:20px;
border-radius:10px;
}
label{
display:block;
margin-top:10px;
}
input{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
box-sizing:border-box;
}
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
font-size:16px;
}
a{
color:#60a5fa;
text-decoration:none;
}
</style>

</head>
<body>

<h2>⚙️ Pengaturan</h2>

<div class="card">

<label>RTMP URL</label>
<input type="text" id="rtmp" placeholder="rtmp://...">

<label>Stream Key</label>
<input type="password" id="streamKey" placeholder="Masukkan Stream Key">

<label>Resolusi</label>
<input type="text" id="resolution" value="1280x720">

<label>Bitrate (kbps)</label>
<input type="number" id="bitrate" value="3500">
<button onclick="saveSettings()">💾 Simpan</button>
</div>

<p><a href="dashboard.html">⬅ Kembali ke Dashboard</a></p>

  <script>

document.getElementById("rtmp").value =
localStorage.getItem("rtmp") || "";

document.getElementById("streamKey").value =
localStorage.getItem("streamKey") || "";

document.getElementById("resolution").value =
localStorage.getItem("resolution") || "1280x720";

document.getElementById("bitrate").value =
localStorage.getItem("bitrate") || "3500";

function saveSettings(){

    localStorage.setItem("rtmp",
        document.getElementById("rtmp").value);

    localStorage.setItem("streamKey",
        document.getElementById("streamKey").value);

    localStorage.setItem("resolution",
        document.getElementById("resolution").value);

    localStorage.setItem("bitrate",
        document.getElementById("bitrate").value);

    alert("Pengaturan berhasil disimpan");

}

</script>
</body>
</html>
