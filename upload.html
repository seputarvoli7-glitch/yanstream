<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Video - YANSTREAM</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
margin:20px;
}

.box{
background:#1f2937;
padding:20px;
border-radius:10px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
box-sizing:border-box;
}

button{
background:#2563eb;
color:white;
font-size:16px;
}

a{
color:#60a5fa;
text-decoration:none;
}
</style>

</head>
<body>

<h2>📤 Upload Video</h2>

<div class="box">

<input type="file" id="videoFile" accept="video/*">

<button onclick="uploadVideo()">Upload</button>
<br><br>

<a href="dashboard.html">⬅ Kembali ke Dashboard</a>

</div>
<script>
async function uploadVideo() {

    const fileInput = document.getElementById("videoFile");
    const file = fileInput.files[0];

    if (!file) {
        alert("Silakan pilih video terlebih dahulu.");
        return;
    }

    const formData = new FormData();
    formData.append("video", file);

    try {

        const response = await fetch("https://yanstream-production.up.railway.app/upload", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        alert(data.message);

        fileInput.value = "";

    } catch (err) {

        alert("Upload gagal: " + err.message);

    }

}
</script>
</body>
</html>
